name: Automated Preprocessing Pipeline

on:
  push:
    branches: [main]
    paths:
      - 'namadataset_raw/**'
      - 'preprocessing/automate_Muhammad-Ivan.py'
  workflow_dispatch:

jobs:
  preprocess:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12.7'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas scikit-learn numpy

      - name: Run automated preprocessing
        run: |
          cd preprocessing
          python automate_Muhammad-Ivan.py

      - name: Upload preprocessed dataset
        uses: actions/upload-artifact@v4
        with:
          name: preprocessed-dataset
          path: preprocessing/namadataset_preprocessing/
          retention-days: 30

      - name: Commit and push preprocessed data
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add preprocessing/namadataset_preprocessing/
          git diff --staged --quiet || git commit -m "Update preprocessed dataset [skip ci]"
          git push